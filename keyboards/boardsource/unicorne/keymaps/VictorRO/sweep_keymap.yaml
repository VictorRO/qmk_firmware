layout: {qmk_keyboard: boardsource/unicorne, layout_name: LAYOUT_split_3x6_3}
layers:
  BASE:
  - [ESC, Q, W, E, R, T, Y, U, I, O, P, BSPC]
  - [TAB, A, S, D, F, G, H, J, K, L, '''', ENT]
  - ['', Z, X, C, V, B, N, M, ',', ., /, '']
  - [LCTL, NAV, LSFT, TD SPC, SYM, DEL]
  EXTEND:
  - ['', '', SW WIN, VOLD, VOLU, MUTE, HOME, PGDN, PGUP, END, '', '']
  - ['', OS CTRL, OS ALT, OS CMD, OS SHFT, '', LEFT, DOWN, UP, RGHT, '', '']
  - ['', '', '', MPRV, MPLY, MNXT, QK REP, '', '', '', SW LANG, '']
  - - {t: LCTL, type: trans}
    - {type: held}
    - {t: LSFT, type: trans}
    - {t: TD SPC, type: trans}
    - {t: 'NUM'}
    - {t: DEL, type: trans}
  SYMBOLS:
  - ['', '!', '@', '#', $, '%', ^, '&', '*', _, ;, '']
  - ['', '`', '~', '{', (, '[', ':', OS SHFT, OS CMD, OS ALT, OS CTRL, '']
  - ['', <, '>', '}', ), ']', '|', '-', '=', +, \, '']
  - - {t: LCTL, type: trans}
    - {t: 'NUM'}
    - {t: LSFT, type: trans}
    - {t: TD SPC, type: trans}
    - {type: held}
    - {t: DEL, type: trans}
  NUMBER:
  - [QK BOOT, RM VALU, RM HUEU, RM SATU, RM NEXT, RM TOGG, '', '7', '8', '9', '', '']
  - ['', OS CTRL, OS ALT, OS CMD, OS SHFT, '', '', '4', '5', '6', '', '']
  - [EE CLR, RM VALD, RM HUED, RM SATD, RM PREV, CK TOGG, '0', '1', '2', '3', '', '']
  - - {t: LCTL, type: trans}
    - {type: held}
    - {t: LSFT, type: trans}
    - {t: TD SPC, type: trans}
    - {type: held}
    - {t: DEL, type: trans}
